<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contact | Edwin Karanja</title>
  <link rel="icon" type="image/x-icon" href="assets/edu.ico" />
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;700;800&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="css/reset.css" rel="stylesheet" />
  <link href="css/tokens.css" rel="stylesheet" />
  <link href="css/main.css" rel="stylesheet" />
</head>

<body class="bg-light">
  <nav class="navbar">
    <a href="index.html" class="brand"><span class="text-primary">EK.</span></a>
    <ul class="nav-links">
      <li><a href="index.html" class="nav-link">Home</a></li>
      <li><a href="resume.html" class="nav-link">Resume</a></li>
      <li><a href="projects.html" class="nav-link">Projects</a></li>
      <li><a href="contact.html" class="nav-link" style="color: var(--color-primary-600);">Contact</a></li>
    </ul>
  </nav>

  <main class="cover">
    <section class="container max-w-3xl center justify-center"
      style="display: flex; min-height: 80vh; align-items: center;">
      <div class="card p-6 shadow-xl w-full" style="max-width: 600px; margin-inline: auto;">
        <div class="text-center stack gap-2 mb-6">
          <div class="mx-auto text-primary"
            style="width: 64px; height: 64px; display: flex; align-items: center; justify-content: center; background: var(--color-primary-100); border-radius: var(--radius-full); margin-inline: auto;">
            <i class="bi bi-envelope text-xl" style="font-size: 1.5rem;"></i>
          </div>
          <h1 class="text-heading-xl text-gray-900" style="margin-top: var(--spacing-4);">Let's Talk</h1>
          <p class="text-body-md text-secondary">Have a project idea, a question, or just want to say hello? I'd love to
            hear from you.</p>
        </div>

        <form class="stack gap-6" action="#" method="POST"
          onsubmit="alert('Message sent successfully!'); return false;">
          <div class="form-group">
            <label for="name" class="form-label">Your Name</label>
            <input type="text" id="name" class="form-input" placeholder="Jane Doe" required />
          </div>

          <div class="form-group">
            <label for="email" class="form-label">Email Address</label>
            <input type="email" id="email" class="form-input" placeholder="jane@example.com" required />
          </div>

          <div class="form-group">
            <label for="message" class="form-label">Your Message</label>
            <textarea id="message" class="form-textarea" placeholder="Tell me about your project or idea..."
              required></textarea>
          </div>

          <button type="submit" class="btn btn-primary btn-lg w-full"
            style="margin-top: var(--spacing-4); width: 100%;">Send Message</button>
        </form>
      </div>
    </section>
  </main>

  <footer class="footer text-center">
    <div class="container cluster justify-between">
      <span class="footer-text">&copy; 2026 Edwin Karanja</span>
      <div class="cluster gap-4">
        <a href="contact.html" class="footer-text nav-link">Contact</a>
        <a href="https://github.com/Eduedsky" class="footer-text nav-link"><i class="bi bi-github"></i></a>
      </div>
    </div>
  </footer>
</body>

</html>
